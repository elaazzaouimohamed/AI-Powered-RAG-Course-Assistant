spring:
  application:
    name: rag-explicateur

  # ── Base de données PostgreSQL avec extension pgvector ──────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_db
    username: ${DB_USER:rag_user}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # En prod : validate. En dev, passer à update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ── Redis : cache des résultats et gestion des sessions ─────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # ── Upload de fichiers (PDF) ─────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB

# ── Sécurité JWT ────────────────────────────────────────────────────────────────
security:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-change-in-production-min-256-bits}
    expiration-ms: 86400000        # 24 heures

# ── Configuration du provider LLM ───────────────────────────────────────────────
# Valeurs possibles : ollama | vllm | cloud
llm:
  provider: ${LLM_PROVIDER:ollama}

  ollama:
    base-url: ${OLLAMA_URL:http://localhost:11434}
    model: ${OLLAMA_MODEL:mistral}
    timeout-seconds: 120

  vllm:
    base-url: ${VLLM_URL:http://localhost:8000}
    model: ${VLLM_MODEL:mistralai/Mistral-7B-Instruct-v0.2}
    timeout-seconds: 120

  cloud:
    # Exemple pour OpenAI / Anthropic / autre API compatible
    base-url: ${CLOUD_LLM_URL:https://api.openai.com/v1}
    api-key: ${CLOUD_LLM_API_KEY:}
    model: ${CLOUD_LLM_MODEL:gpt-4o-mini}

# ── Service Python d'ingestion (chunking + embedding) ──────────────────────────
ingestion:
  service:
    url: ${INGESTION_SERVICE_URL:http://localhost:8001}
    timeout-seconds: 300

# ── Serveur ──────────────────────────────────────────────────────────────────────
server:
  port: 8080
  compression:
    enabled: true

# ── Logging ──────────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.fsbm.rag: DEBUG
