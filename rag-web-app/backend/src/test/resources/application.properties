# ===== Configuration de test : base H2 en mémoire (aucune dépendance MySQL) =====
spring.datasource.url=jdbc:h2:mem:ragtest;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Secret JWT fixe et déterministe pour les tests
app.jwt.secret=TestSecretKeyForJUnitRagExplicateurCours2025MinimumLength256bitsAAAA
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Le service RAG n'est pas démarré pendant les tests : URL inerte
app.rag-service.url=http://localhost:59999

# Backends LLM : valeurs inertes (les tests n'appellent jamais un vrai LLM)
app.llm.nvidia.url=http://localhost:59999/v1/chat/completions
app.llm.nvidia.api-key=
app.llm.nvidia.default-model=test-model
app.llm.ollama.url=http://localhost:59999
app.llm.ollama.default-model=test-model
app.llm.lmstudio.url=http://localhost:59999/v1
app.llm.lmstudio.default-model=test-model

app.cors.allowed-origins=http://localhost:5173
