server.port=${SERVER_PORT:8080}
spring.application.name=rag-explicateur-cours

# ===== Upload de cours (PDF) =====
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===== MySQL DataSource =====
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/rag_llm?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.pool-name=RagHikariPool

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

# ===== Jackson =====
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:ChangeThisSecretKeyInProductionMinimum256BitsLongPlaceholderValue}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ===== Service RAG (Python / FastAPI) =====
app.rag-service.url=${RAG_SERVICE_URL:http://localhost:8001}

# ===== Backends LLM =====
app.llm.nvidia.url=${NVIDIA_URL:https://integrate.api.nvidia.com/v1/chat/completions}
app.llm.nvidia.api-key=${NVIDIA_API_KEY:}
app.llm.nvidia.default-model=${NVIDIA_MODEL:moonshotai/kimi-k2.6}
app.llm.ollama.url=${OLLAMA_URL:http://localhost:11434}
app.llm.ollama.default-model=${OLLAMA_MODEL:gemma3:4b}
app.llm.lmstudio.url=${LMSTUDIO_URL:http://localhost:1234/v1}
app.llm.lmstudio.default-model=${LMSTUDIO_MODEL:gemma3:4b}

# ===== Actuator (monitoring) =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ===== Logging =====
logging.level.com.rag=INFO
logging.level.org.springframework.security=WARN
